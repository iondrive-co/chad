name: Release Build

"on":
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.11.0)'
        required: false

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install UI dependencies
        run: |
          cd ui
          npm install

      - name: Build installer
        run: |
          python scripts/build_release.py --output release

      - name: Get artifact name
        id: artifact
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ARTIFACT=$(ls release/*.zip 2>/dev/null || ls release/*.exe 2>/dev/null | head -1)
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            ARTIFACT=$(ls release/*.tar.gz 2>/dev/null || ls release/*macos* 2>/dev/null | head -1)
          else
            ARTIFACT=$(ls release/*.deb 2>/dev/null || ls release/*.tar.gz 2>/dev/null || ls release/*linux* 2>/dev/null | head -1)
          fi
          echo "path=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "name=$(basename $ARTIFACT)" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chad-${{ runner.os }}
          path: release/*
          retention-days: 7

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Install UI dependencies
        run: |
          cd ui
          npm install

      - name: Build UI
        run: python scripts/build_ui.py

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*
