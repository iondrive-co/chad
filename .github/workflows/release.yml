name: Release Build

"on":
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.11.0)'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build client library
        run: |
          cd client
          npm install
          npm run build

      - name: Install UI dependencies
        run: |
          cd ui
          npm install

      - name: Install WiX Toolset (Windows)
        if: runner.os == 'Windows'
        run: choco install wixtoolset -y --no-progress

      - name: Build installer
        run: |
          python scripts/build_release.py --output release

      - name: Get artifact name
        id: artifact
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ARTIFACT=$(ls release/*.msi 2>/dev/null || ls release/*.exe 2>/dev/null || ls release/*.zip 2>/dev/null | head -1)
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            ARTIFACT=$(ls release/*.pkg 2>/dev/null || ls release/*macos* 2>/dev/null | head -1)
          else
            ARTIFACT=$(ls release/*.deb 2>/dev/null || ls release/*.tar.gz 2>/dev/null || ls release/*linux* 2>/dev/null | head -1)
          fi
          echo "path=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "name=$(basename $ARTIFACT)" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chad-${{ runner.os }}
          path: |
            release/*.msi
            release/*.deb
            release/*.pkg
          retention-days: 7

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.msi
            release/*.deb
            release/*.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
